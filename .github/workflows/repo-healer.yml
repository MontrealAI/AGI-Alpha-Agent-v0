name: "🩹 Repo-Healer v1"

on:
  workflow_run:
    workflows:
      - "🚀 Integration CI — Insight Demo"
      - "✅ PR CI"
      - "🔥 Smoke Test"
      - "📚 Docs"
    types: [completed]
  workflow_dispatch:
    inputs:
      apply-after-attempt:
        description: "Minimum run attempt before AUTOPATCH_SAFE apply mode is allowed"
        required: false
        default: "2"

permissions:
  contents: read
  actions: read

jobs:
  triage-and-report:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Build structured failure bundle
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python -m alpha_factory_v1.demos.self_healing_repo.repo_healer_v1.ci_bundle \
            --event-path "$GITHUB_EVENT_PATH" \
            --repository "$GITHUB_REPOSITORY" \
            --token "$GITHUB_TOKEN" \
            --bundle-out repo_healer_bundle.json \
            --candidates-out repo_healer_candidates.json

      - name: Run Repo-Healer
        run: |
          MODE=$(python - <<'PY'
          import json
          import os
          from pathlib import Path

          bundle = json.loads(Path("repo_healer_bundle.json").read_text(encoding="utf-8"))
          support_mode = bundle.get("support_mode", "AUTOPATCH_SAFE")
          run_attempt = int(bundle.get("run_attempt", 1))
          event_name = os.getenv("GITHUB_EVENT_NAME", "")
          apply_after_attempt = int(os.getenv("REPO_HEALER_APPLY_AFTER_ATTEMPT", "2") or "2")
          if event_name == "workflow_dispatch":
              print("REPORT_ONLY")
          elif support_mode != "AUTOPATCH_SAFE":
              print("REPORT_ONLY")
          elif run_attempt < apply_after_attempt:
              print("DRY_RUN")
          else:
              print("APPLY")
          PY
          )

          if [ "$MODE" = "REPORT_ONLY" ]; then
            python -m alpha_factory_v1.demos.self_healing_repo.repo_healer_v1.cli \
              --repo . \
              --failure-bundle repo_healer_bundle.json \
              --candidates repo_healer_candidates.json \
              --report repo_healer_report.json \
              --report-only
          elif [ "$MODE" = "DRY_RUN" ]; then
            set +e
            python -m alpha_factory_v1.demos.self_healing_repo.repo_healer_v1.cli \
              --repo . \
              --failure-bundle repo_healer_bundle.json \
              --candidates repo_healer_candidates.json \
              --report repo_healer_report.json \
              --dry-run
            dry_run_rc=$?
            set -e

            if [ "$dry_run_rc" -ne 0 ]; then
              echo "::warning::Repo-Healer dry-run found no safe candidate; emitting report-only diagnosis artifact."
              python -m alpha_factory_v1.demos.self_healing_repo.repo_healer_v1.cli \
                --repo . \
                --failure-bundle repo_healer_bundle.json \
                --candidates repo_healer_candidates.json \
                --report repo_healer_report.json \
                --report-only
            fi
          else
            python -m alpha_factory_v1.demos.self_healing_repo.repo_healer_v1.cli \
              --repo . \
              --failure-bundle repo_healer_bundle.json \
              --candidates repo_healer_candidates.json \
              --report repo_healer_report.json
          fi
        env:
          REPO_HEALER_APPLY_AFTER_ATTEMPT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs['apply-after-attempt'] || '2' }}

      - name: Upload repo-healer artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4.6.2
        with:
          name: repo-healer-v1-report
          path: |
            repo_healer_bundle.json
            repo_healer_candidates.json
            repo_healer_report.json
