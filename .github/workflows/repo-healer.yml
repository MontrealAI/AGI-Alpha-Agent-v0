name: "🩹 Repo-Healer v1"

on:
  workflow_run:
    workflows:
      - "🚀 CI — Insight Demo"
      - "✅ PR CI"
      - "🔥 Smoke Test"
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  triage-and-report:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
      - name: Build structured failure bundle
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import urllib.request
          from pathlib import Path

          event_path = Path(os.environ["GITHUB_EVENT_PATH"])
          payload = json.loads(event_path.read_text(encoding="utf-8"))
          run = payload.get("workflow_run", {})

          def infer_platform() -> str:
              run_id = run.get("id")
              token = os.environ.get("GITHUB_TOKEN")
              if not run_id or not token:
                  return "linux"
              api = f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{run_id}/jobs"
              req = urllib.request.Request(
                  api,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                  },
              )
              try:
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      jobs_payload = json.loads(resp.read().decode("utf-8"))
              except Exception:
                  return "linux"

              for job in jobs_payload.get("jobs", []):
                  if job.get("conclusion") != "failure":
                      continue
                  haystack = " ".join(
                      [
                          str(job.get("runner_name", "")).lower(),
                          *[str(label).lower() for label in job.get("labels", [])],
                          str(job.get("name", "")).lower(),
                      ]
                  )
                  if "windows" in haystack:
                      return "windows"
                  if "macos" in haystack or "mac" in haystack:
                      return "macos"
              return "linux"

          def load_failed_job():
              run_id = run.get("id")
              token = os.environ.get("GITHUB_TOKEN")
              if not run_id or not token:
                  return {}
              api = f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{run_id}/jobs"
              req = urllib.request.Request(
                  api,
                  headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"},
              )
              try:
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      jobs_payload = json.loads(resp.read().decode("utf-8"))
              except Exception:
                  return {}
              for job in jobs_payload.get("jobs", []):
                  if job.get("conclusion") == "failure":
                      return job
              return {}

          def infer_validator(job_name, step_name, logs):
              text = " ".join([job_name, step_name, logs]).lower()
              if "ruff" in text:
                  return "ruff", ["ruff", "check", "."]
              if "mypy" in text:
                  return "mypy", ["mypy", "--config-file", "mypy.ini"]
              if "mkdocs" in text or "docs" in text:
                  return "mkdocs", ["mkdocs", "build", "--strict"]
              if "smoke" in text:
                  return "smoke", ["pytest", "-m", "smoke", "-q"]
              if "pytest" in text or "test" in text:
                  return "pytest", ["pytest", "-q"]
              return "none", ["python", "-m", "pytest", "-q"]

          def candidate_files_from_logs(logs):
              hits = set(re.findall(r"(?:alpha_factory_v1|tests|docs)/[\\w./-]+\\.(?:py|md|yml|yaml)", logs))
              return sorted(hits)

          failed_job = load_failed_job()
          failed_step = ""
          for step in failed_job.get("steps", []):
              if step.get("conclusion") == "failure":
                  failed_step = step.get("name", "")
                  break
          logs = (
              f"conclusion={run.get('conclusion', 'unknown')} event={run.get('event', 'workflow_dispatch')} "
              f"job={failed_job.get('name', '')} step={failed_step}"
          )
          validator_class, replay_cmd = infer_validator(failed_job.get("name", ""), failed_step, logs)
          candidate_files = candidate_files_from_logs(logs)
          support_mode = "AUTOPATCH_SAFE" if validator_class in {"ruff", "mypy", "pytest", "smoke", "mkdocs"} else "REPORT_ONLY"
          risk_tier = "tier1" if support_mode == "AUTOPATCH_SAFE" else "tier2"

          bundle = {
              "workflow": run.get("name", "manual"),
              "job": failed_job.get("name", "workflow_run"),
              "step": failed_step or "summary",
              "run_id": str(run.get("id", "manual")),
              "sha": run.get("head_sha", os.environ.get("GITHUB_SHA", "unknown")),
              "platform": infer_platform(),
              "failure_class": "workflow_run_failure",
              "exit_code": 1,
              "candidate_files": candidate_files,
              "reproduction_command": replay_cmd,
              "validator_class": validator_class,
              "risk_tier": risk_tier,
              "support_mode": support_mode,
              "logs": logs,
              "annotations": [],
              "artifacts": {"event": str(event_path)},
          }
          Path("repo_healer_bundle.json").write_text(json.dumps(bundle, indent=2), encoding="utf-8")
          Path("repo_healer_candidates.json").write_text(
              json.dumps([], indent=2),
              encoding="utf-8",
          )
          PY
      - name: Run Repo-Healer in report-only mode
        run: |
          python -m alpha_factory_v1.demos.self_healing_repo.repo_healer_v1.cli \
            --repo . \
            --failure-bundle repo_healer_bundle.json \
            --candidates repo_healer_candidates.json \
            --report repo_healer_report.json \
            --report-only
      - name: Upload repo-healer artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: repo-healer-v1-report
          path: |
            repo_healer_bundle.json
            repo_healer_candidates.json
            repo_healer_report.json
