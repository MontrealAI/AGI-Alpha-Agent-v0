name: "🩹 Repo-Healer v1"

on:
  workflow_run:
    workflows:
      - "🚀 Integration CI — Insight Demo"
      - "✅ PR CI"
      - "🔥 Smoke Test"
      - "📚 Docs"
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  triage-and-report:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Build structured failure bundle
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python -m alpha_factory_v1.demos.self_healing_repo.repo_healer_v1.ci_bundle \
            --event-path "$GITHUB_EVENT_PATH" \
            --repository "$GITHUB_REPOSITORY" \
            --token "$GITHUB_TOKEN" \
            --bundle-out repo_healer_bundle.json \
            --candidates-out repo_healer_candidates.json

      - name: Mark early-attempt runs as report-only
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.run_attempt < 2 }}
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          bundle_path = Path("repo_healer_bundle.json")
          bundle = json.loads(bundle_path.read_text(encoding="utf-8"))
          bundle["support_mode"] = "REPORT_ONLY"
          bundle["logs"] = f"{bundle.get('logs', '')}\nrun_attempt={bundle.get('artifacts', {}).get('run_attempt', '1')} pending ci-health reruns"
          bundle_path.write_text(json.dumps(bundle, indent=2), encoding="utf-8")
          PY

      - name: Run Repo-Healer
        run: |
          MODE=$(python - <<'PY'
          import json
          from pathlib import Path

          bundle = json.loads(Path("repo_healer_bundle.json").read_text(encoding="utf-8"))
          candidates = json.loads(Path("repo_healer_candidates.json").read_text(encoding="utf-8"))
          support_mode = bundle.get("support_mode", "AUTOPATCH_SAFE")
          if support_mode == "REPORT_ONLY" or not candidates:
              print("REPORT_ONLY")
          else:
              print("AUTOPATCH_SAFE")
          PY
          )

          if [ "$MODE" = "REPORT_ONLY" ]; then
            python -m alpha_factory_v1.demos.self_healing_repo.repo_healer_v1.cli \
              --repo . \
              --failure-bundle repo_healer_bundle.json \
              --candidates repo_healer_candidates.json \
              --report repo_healer_report.json \
              --report-only
          else
            python -m alpha_factory_v1.demos.self_healing_repo.repo_healer_v1.cli \
              --repo . \
              --failure-bundle repo_healer_bundle.json \
              --candidates repo_healer_candidates.json \
              --report repo_healer_report.json \
              --dry-run
          fi

      - name: Upload repo-healer artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: repo-healer-v1-report
          path: |
            repo_healer_bundle.json
            repo_healer_candidates.json
            repo_healer_report.json
