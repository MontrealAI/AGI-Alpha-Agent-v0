name: "🩹 Repo-Healer v1"

on:
  workflow_run:
    workflows:
      - "🚀 CI — Insight Demo"
      - "✅ PR CI"
      - "🔥 Smoke Test"
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  triage-and-report:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
      - name: Build structured failure bundle
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path
          from alpha_factory_v1.demos.self_healing_repo.repo_healer_v1.ci_ingest import build_bundle_from_event
          from alpha_factory_v1.demos.self_healing_repo.repo_healer_v1.models import SupportMode

          event_path = Path(os.environ["GITHUB_EVENT_PATH"])
          payload = json.loads(event_path.read_text(encoding="utf-8"))
          run = payload.get("workflow_run", {})

          run_id = run.get("id")
          token = os.environ.get("GITHUB_TOKEN")
          if run_id and token:
              jobs_api = f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{run_id}/jobs"
              jobs_req = urllib.request.Request(
                  jobs_api,
                  headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"},
              )
              try:
                  with urllib.request.urlopen(jobs_req, timeout=20) as resp:
                      jobs_payload = json.loads(resp.read().decode("utf-8"))
                  jobs_path = Path("repo_healer_jobs.json")
                  jobs_path.write_text(json.dumps(jobs_payload, indent=2), encoding="utf-8")
                  os.environ["REPO_HEALER_JOBS_JSON"] = str(jobs_path)
              except Exception:
                  pass

          bundle = build_bundle_from_event(payload, Path.cwd())
          if run.get("conclusion") == "failure":
              bundle.support_mode = SupportMode.AUTOPATCH_SAFE
          else:
              bundle.support_mode = SupportMode.REPORT_ONLY
          Path("repo_healer_bundle.json").write_text(json.dumps(bundle.to_dict(), indent=2), encoding="utf-8")
          Path("repo_healer_candidates.json").write_text(
              json.dumps([], indent=2),
              encoding="utf-8",
          )
          PY
      - name: Run Repo-Healer in report-only mode
        run: |
          python -m alpha_factory_v1.demos.self_healing_repo.repo_healer_v1.cli \
            --repo . \
            --failure-bundle repo_healer_bundle.json \
            --candidates repo_healer_candidates.json \
            --report repo_healer_report.json \
            --report-only
      - name: Upload repo-healer artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: repo-healer-v1-report
          path: |
            repo_healer_bundle.json
            repo_healer_candidates.json
            repo_healer_report.json
